<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Klein blue background -->
  <rect width="512" height="512" rx="96" fill="#002FA7"/>

  <!-- Spreadsheet grid dots (top right) -->
  <rect x="356" y="42" width="38" height="38" rx="8" fill="#4ADE80"/>
  <rect x="404" y="42" width="38" height="38" rx="8" fill="#60A5FA"/>
  <rect x="356" y="90" width="38" height="38" rx="8" fill="#FBBF24"/>
  <rect x="404" y="90" width="38" height="38" rx="8" fill="#F472B6"/>

  <!-- Robot head body -->
  <rect x="128" y="52" width="256" height="198" rx="36" fill="#001B7A"/>

  <!-- Antenna -->
  <rect x="240" y="20" width="32" height="42" rx="10" fill="#4488FF"/>
  <circle cx="256" cy="16" r="20" fill="#7AB0FF"/>

  <!-- Robot ears -->
  <rect x="94" y="96" width="38" height="64" rx="14" fill="#001B7A"/>
  <rect x="380" y="96" width="38" height="64" rx="14" fill="#001B7A"/>

  <!-- Eyes (white screens) -->
  <rect x="148" y="90" width="86" height="70" rx="18" fill="white"/>
  <rect x="278" y="90" width="86" height="70" rx="18" fill="white"/>

  <!-- Pupils -->
  <circle cx="191" cy="125" r="24" fill="#001B7A"/>
  <circle cx="321" cy="125" r="24" fill="#001B7A"/>

  <!-- Eye shine -->
  <circle cx="180" cy="114" r="9" fill="white"/>
  <circle cx="310" cy="114" r="9" fill="white"/>

  <!-- Mouth panel -->
  <rect x="154" y="182" width="204" height="48" rx="16" fill="#001060"/>
  <rect x="170" y="194" width="32" height="26" rx="7" fill="white" opacity="0.35"/>
  <rect x="214" y="194" width="32" height="26" rx="7" fill="white" opacity="0.35"/>
  <rect x="258" y="194" width="32" height="26" rx="7" fill="white" opacity="0.35"/>
  <rect x="302" y="194" width="32" height="26" rx="7" fill="white" opacity="0.35"/>

  <!-- XB -->
  <text x="256" y="390" text-anchor="middle" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="178" fill="white" letter-spacing="-4">XB</text>

  <!-- XLSBUDDY -->
  <text x="256" y="458" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="50" fill="white" letter-spacing="14">XLSBUDDY</text>
</svg>
