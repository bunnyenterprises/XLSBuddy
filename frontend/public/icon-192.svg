<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Klein blue background -->
  <rect width="192" height="192" rx="36" fill="#002FA7"/>

  <!-- Spreadsheet grid dots (top right) -->
  <rect x="134" y="16" width="14" height="14" rx="3" fill="#4ADE80"/>
  <rect x="152" y="16" width="14" height="14" rx="3" fill="#60A5FA"/>
  <rect x="134" y="34" width="14" height="14" rx="3" fill="#FBBF24"/>
  <rect x="152" y="34" width="14" height="14" rx="3" fill="#F472B6"/>

  <!-- Robot head body -->
  <rect x="48" y="20" width="96" height="74" rx="14" fill="#001B7A"/>

  <!-- Antenna -->
  <rect x="90" y="8" width="12" height="16" rx="4" fill="#4488FF"/>
  <circle cx="96" cy="6" r="7" fill="#7AB0FF"/>

  <!-- Robot ears -->
  <rect x="36" y="36" width="14" height="24" rx="5" fill="#001B7A"/>
  <rect x="142" y="36" width="14" height="24" rx="5" fill="#001B7A"/>

  <!-- Eyes (white screens) -->
  <rect x="56" y="34" width="32" height="26" rx="7" fill="white"/>
  <rect x="104" y="34" width="32" height="26" rx="7" fill="white"/>

  <!-- Pupils -->
  <circle cx="72" cy="47" r="9" fill="#001B7A"/>
  <circle cx="120" cy="47" r="9" fill="#001B7A"/>

  <!-- Eye shine -->
  <circle cx="68" cy="43" r="3.5" fill="white"/>
  <circle cx="116" cy="43" r="3.5" fill="white"/>

  <!-- Mouth panel -->
  <rect x="58" y="68" width="76" height="18" rx="6" fill="#001060"/>
  <rect x="64" y="72" width="12" height="10" rx="3" fill="white" opacity="0.35"/>
  <rect x="80" y="72" width="12" height="10" rx="3" fill="white" opacity="0.35"/>
  <rect x="96" y="72" width="12" height="10" rx="3" fill="white" opacity="0.35"/>
  <rect x="112" y="72" width="12" height="10" rx="3" fill="white" opacity="0.35"/>

  <!-- XB -->
  <text x="96" y="148" text-anchor="middle" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="66" fill="white" letter-spacing="-1">XB</text>

  <!-- XLSBUDDY -->
  <text x="96" y="172" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="19" fill="white" letter-spacing="5">XLSBUDDY</text>
</svg>
